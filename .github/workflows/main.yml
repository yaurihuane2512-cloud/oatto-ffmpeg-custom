name: Build FFmpeg LGPL for Oatto
on: workflow_dispatch

jobs:
  build_ffmpeg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ffmpeg-kit
        uses: actions/checkout@v4
        with:
          repository: arthenica/ffmpeg-kit
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android NDK
        run: |
          # Instalamos la versión exacta que pide la documentación para evitar errores de compilador
          echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"

      - name: Build AAR LGPL (Configuración Oatto)
        run: |
          # 1. Definimos las rutas que GitHub oculta por defecto
          export ANDROID_HOME=$ANDROID_HOME
          export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653
          
          # 2. PERMISO CRÍTICO: Sin esto, da Exit Code 1 a los 30 segundos
          chmod +x android.sh
          chmod +x scripts/*.sh
          
          # 3. Ejecución con la bandera --lts (Long Term Support) para mayor estabilidad en Android
          ./android.sh \
            --lts \
            --enable-libvpx \
            --enable-lame \
            --enable-freetype \
            --enable-fontconfig \
            --disable-gpl \
            --disable-x264 \
            --disable-x265

      - name: Upload Oatto AAR
        uses: actions/upload-artifact@v4
        with:
          name: oatto-ffmpeg-lgpl
          # Usamos un comodín (**) para que GitHub encuentre el AAR en cualquier carpeta que se cree
          path: prebuilt/**/ffmpeg-kit/*.aar
